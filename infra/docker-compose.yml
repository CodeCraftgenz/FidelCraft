services:
  db:
    image: mysql:8.0
    container_name: fidelcraft-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fidelcraft_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fidelcraft}
      MYSQL_USER: ${MYSQL_USER:-fidelcraft}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fidelcraft_pass}
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - fidelcraft-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-fidelcraft_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fidelcraft-network

volumes:
  fidelcraft-data:

networks:
  fidelcraft-network:
    driver: bridge
